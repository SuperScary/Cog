name: Bleeding Edge Release

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'languages/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: cog
            asset_name: cog-linux-x64.zip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: cog.exe
            asset_name: cog-windows-x64.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: cog
            asset_name: cog-macos-x64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Packaging Info
        shell: bash
        run: |
          BINARY_PATH="target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          echo "BINARY_PATH=$BINARY_PATH" >> $GITHUB_ENV

      - name: Package assets
        shell: bash
        run: |
          mkdir -p dist
          cp ${{ env.BINARY_PATH }} dist/
          if [ -d "languages" ]; then
            cp -r languages dist/
          fi
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            cd dist && 7z a ../${{ matrix.asset_name }} *
          else
            cd dist && zip -r ../${{ matrix.asset_name }} .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Bleeding Edge Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or Update Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f bleeding-edge
          git push origin bleeding-edge --force
        continue-on-error: true

      - name: Set Release Info
        run: |
          echo "CURRENT_DATE=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bleeding-edge
          name: Bleeding Edge Build (${{ env.SHORT_SHA }})
          body: "This is an automated bleeding edge build of Cog. Built from commit ${{ env.SHORT_SHA }} at ${{ env.CURRENT_DATE }}."
          prerelease: true
          files: artifacts/**/*.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
